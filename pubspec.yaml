name: thimar
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_bloc: ^9.1.1
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^19.1.0
  geolocator: ^14.0.2
  location: ^8.0.1
  google_maps_flutter: ^2.14.2
  geocoding: ^4.0.0
  dio: ^5.9.2
  easy_localization: ^3.0.8
  socket_io_client: ^3.1.4
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  pin_code_fields: ^8.0.1
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.2
  flash: ^3.1.1
  lottie: ^3.3.2
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  flutter_widget_from_html: ^0.17.1
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_gen_runner:
  flutter_gen: ^5.4.0
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/ar.json
    - assets/translations/en.json
  fonts:
    - family: tajawal
      fonts:
        - asset: assets/fonts/tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/tajawal/Tajawal-Bold.ttf
          weight: 700
flutter_assets:
  assets_path: assets/
  output_path: lib/gen/
  filename: assets.dart
  field_prefix: